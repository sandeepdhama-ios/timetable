<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler Pro v6 - Precise CSV Mapping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div class="max-w-6xl mx-auto py-6 px-4">
        <!-- HEADER -->
        <header class="bg-indigo-900 text-white p-6 rounded-t-2xl shadow-xl flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-widest">Scheduler v6</h1>
                <p class="text-indigo-300 text-xs">Precise Slot Mapping: 11th - 23rd May</p>
            </div>
            <button onclick="clearCache()" class="bg-red-500/20 hover:bg-red-600 text-[10px] px-3 py-2 rounded font-bold uppercase transition-all">Clear All Data</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
            
            <!-- 1. CSV & MANUAL ENTRY -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-indigo-700 mb-4 border-b pb-2">1. Input Teachers</h2>
                
                <div class="p-4 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-xl mb-6">
                    <label class="block text-[11px] font-black text-indigo-600 mb-2 uppercase text-center">Import Teacher CSV</label>
                    <input type="file" id="csvTeachers" accept=".csv" class="text-xs w-full cursor-pointer file:bg-indigo-600 file:text-white file:border-0 file:rounded file:px-3 file:py-1 file:mr-2">
                    <div class="mt-3 text-[9px] text-indigo-400 leading-tight">
                        <strong>Expected CSV Format:</strong><br>
                        Teacher, Subject, Slot<br>
                        <em>Example: Rajesh, Math, Slot 1</em>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Or Add Manually</p>
                    <input id="tName" type="text" placeholder="Teacher Name" class="w-full p-2 border rounded-lg text-sm">
                    <select id="tSubject" class="w-full p-2 border rounded-lg text-sm">
                        <option>Math</option><option>Natural Science</option><option>Hindi</option>
                        <option>Social Science</option><option>English</option>
                    </select>
                    <select id="tSlot" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                        <option value="slot 1">Slot 1 (11th-16th May)</option>
                        <option value="slot 2">Slot 2 (18th-23rd May)</option>
                        <option value="both">Both</option>
                    </select>
                    <button onclick="addTeacher()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700">Add Teacher</button>
                </div>
            </div>

            <!-- 2. DATA MANAGEMENT -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-red-600 mb-4 border-b pb-2">2. Manage & Class</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Delete Teacher</label>
                        <select id="deleteSelector" class="w-full p-2 border rounded-lg text-sm mt-1"></select>
                        <button onclick="deleteSelectedTeacher()" class="w-full bg-red-50 text-red-600 py-2 rounded-lg font-bold mt-2 text-xs hover:bg-red-100">Remove Selected</button>
                    </div>
                    <div class="pt-4 border-t">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Add Class Section</label>
                        <div class="flex gap-2 mt-1">
                            <select id="cLevel" class="p-2 border rounded-lg flex-1 text-sm"><option value="9">9th</option><option value="10">10th</option></select>
                            <select id="cSection" class="p-2 border rounded-lg flex-1 text-sm"></select>
                        </div>
                        <button onclick="addClass()" class="w-full bg-slate-800 text-white py-2 rounded-lg font-bold mt-2 text-xs">Add Section</button>
                    </div>
                </div>
            </div>

            <!-- 3. GENERATOR -->
            <div class="bg-white p-6 rounded-xl shadow-lg border-2 border-green-500">
                <h2 class="text-lg font-bold text-green-700 mb-4 border-b pb-2">3. Run Tool</h2>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Target Generation Slot</label>
                    <select id="genSlot" class="w-full p-3 rounded border bg-green-50 font-bold text-green-800">
                        <option value="slot 1">11th May - 16th May (Slot 1)</option>
                        <option value="slot 2">18th May - 23rd May (Slot 2)</option>
                    </select>
                    <button onclick="generate()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-xl shadow-lg hover:bg-green-700">GENERATE</button>
                    
                    <div class="flex gap-2">
                        <button onclick="exportPDF()" class="flex-1 bg-red-600 text-white py-2 rounded font-bold text-xs">PDF</button>
                        <button onclick="exportExcel()" class="flex-1 bg-green-800 text-white py-2 rounded font-bold text-xs">Excel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TEACHER REPOSITORY VIEW -->
        <div class="mt-8">
            <h3 class="text-sm font-black text-slate-400 uppercase mb-4 tracking-widest">Active Teacher Repository</h3>
            <div id="teacherRepo" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
        </div>

        <!-- RESULTS TABLE -->
        <div id="result" class="mt-10 bg-white rounded-xl shadow-2xl overflow-hidden border">
            <div class="p-10 text-center text-slate-300 italic">Timetable will be rendered here...</div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tt_v6')) || { teachers: [], classes: [] };
        const subjects = ["Math", "Natural Science", "Hindi", "Social Science", "English"];

        // Init Sections
        const sectDropdown = document.getElementById('cSection');
        for(let i=65; i<=90; i++) {
            let opt = document.createElement('option');
            opt.value = String.fromCharCode(i); opt.innerText = String.fromCharCode(i);
            sectDropdown.appendChild(opt);
        }

        function save() {
            localStorage.setItem('tt_v6', JSON.stringify(db));
            refreshUI();
        }

        function refreshUI() {
            // Refresh Delete Dropdown
            const selector = document.getElementById('deleteSelector');
            selector.innerHTML = '<option value="">-- Select Teacher --</option>' + 
                db.teachers.map(t => `<option value="${t.id}">${t.name} (${t.sub})</option>`).join('');

            // Refresh Visual Repository
            document.getElementById('teacherRepo').innerHTML = db.teachers.map(t => `
                <div class="bg-white border p-3 rounded shadow-sm text-center">
                    <div class="font-bold text-indigo-700 text-xs truncate">${t.name}</div>
                    <div class="text-[9px] text-gray-500 uppercase font-bold">${t.sub}</div>
                    <div class="mt-2 text-[8px] px-1 bg-gray-100 rounded text-gray-400">${t.slot}</div>
                </div>
            `).join('');
        }

        function addTeacher() {
            const name = document.getElementById('tName').value.trim();
            const sub = document.getElementById('tSubject').value;
            const slot = document.getElementById('tSlot').value;
            if(!name) return;
            db.teachers.push({ id: Date.now() + Math.random(), name, sub, slot: slot.toLowerCase() });
            document.getElementById('tName').value = '';
            save();
        }

        function deleteSelectedTeacher() {
            const id = document.getElementById('deleteSelector').value;
            if(!id) return;
            db.teachers = db.teachers.filter(t => t.id != id);
            save();
        }

        function addClass() {
            const grade = document.getElementById('cLevel').value;
            const sec = document.getElementById('cSection').value;
            if(db.classes.find(c => c.grade == grade && c.sec == sec)) return;
            db.classes.push({ id: Date.now(), grade, sec });
            save();
        }

        function clearCache() {
            if(confirm("Erase all data?")) { localStorage.removeItem('tt_v6'); location.reload(); }
        }

        // --- ENHANCED CSV PARSER ---
        document.getElementById('csvTeachers').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split(/\r?\n/);
                lines.forEach(line => {
                    const cols = line.split(',');
                    if(cols.length >= 2) {
                        const name = cols[0].trim();
                        const sub = cols[1].trim();
                        let rawSlot = cols[2] ? cols[2].trim().toLowerCase() : 'both';
                        
                        // Normalize Slot Naming from CSV
                        let finalSlot = 'both';
                        if(rawSlot.includes('slot 1')) finalSlot = 'slot 1';
                        else if(rawSlot.includes('slot 2')) finalSlot = 'slot 2';

                        if(name && sub) {
                            db.teachers.push({ id: Date.now() + Math.random(), name, sub, slot: finalSlot });
                        }
                    }
                });
                save();
                alert("Imported successfully. Check the Repository below.");
            };
            reader.readAsText(file);
        });

        // --- GENERATOR WITH CLUBBING ---
        function generate() {
            const targetSlot = document.getElementById('genSlot').value.toLowerCase();
            let staff = db.teachers.filter(t => t.slot === targetSlot || t.slot === 'both');
            let sections = [...db.classes].sort((a,b) => a.grade - b.grade || a.sec.localeCompare(b.sec));

            if(!staff.length) return alert("No teachers found for this slot.");

            let teacherBusy = { 0: [], 1: [], 2: [] }; 
            let rows = [];
            let processed = new Set();

            sections.forEach(sec => {
                if(processed.has(sec.id)) return;

                let row = { label: `${sec.grade}-${sec.sec}`, periods: [] };
                
                for(let p=0; p<3; p++) {
                    let shuffledSubs = [...subjects].sort(() => 0.5 - Math.random());
                    let assigned = false;

                    for(let s of shuffledSubs) {
                        let t = staff.find(teacher => teacher.sub === s && !teacherBusy[p].includes(teacher.id));
                        if(t) {
                            teacherBusy[p].push(t.id);
                            row.periods[p] = { sub: t.sub, name: t.name, club: false };
                            assigned = true;
                            break;
                        }
                    }

                    if(!assigned) {
                        let clubTarget = rows.find(prev => prev.periods[p] && !prev.periods[p].club && prev.label.startsWith(sec.grade));
                        if(clubTarget) {
                            row.label += ` & ${sec.sec}`;
                            row.periods[p] = { ...clubTarget.periods[p], club: true };
                            clubTarget.periods[p].club = true;
                            assigned = true;
                        } else {
                            row.periods[p] = { sub: "No Staff", name: "Merge Needed", club: false };
                        }
                    }
                }
                rows.push(row);
                processed.add(sec.id);
            });

            render(rows);
        }

        function render(data) {
            let html = `<table id="resTable" class="w-full border-collapse text-xs">
                <thead class="bg-indigo-900 text-white">
                    <tr><th class="p-3 border border-indigo-800">Class Section</th>
                    <th class="p-3 border border-indigo-800">07:30 - 08:30</th>
                    <th class="p-3 border border-indigo-800">08:30 - 09:30</th>
                    <th class="p-3 border border-indigo-800">09:30 - 10:30</th></tr>
                </thead><tbody>`;
            data.forEach(r => {
                html += `<tr><td class="p-3 border font-bold bg-gray-50 text-center">${r.label}</td>`;
                r.periods.forEach(c => {
                    html += `<td class="p-3 border text-center ${c.club ? 'bg-amber-50' : ''}">
                        <div class="font-bold text-indigo-700">${c.sub}</div>
                        <div class="text-[9px] text-gray-500">${c.name}</div>
                        ${c.club ? '<div class="text-[8px] font-bold text-amber-600 uppercase mt-1">Clubbed</div>' : ''}
                    </td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('result').innerHTML = html + `</tbody></table>`;
        }

        function exportPDF() { 
            const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'pt');
            doc.autoTable({ html: '#resTable', theme: 'grid', styles: {fontSize: 7} });
            doc.save("Timetable.pdf"); 
        }

        function exportExcel() { 
            const wb = XLSX.utils.table_to_book(document.getElementById("resTable")); 
            XLSX.writeFile(wb, "Timetable.xlsx"); 
        }

        refreshUI();
    </script>
</body>
</html>
